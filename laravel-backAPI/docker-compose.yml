services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: laravel_backapi_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./app:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backapi_net

  nginx:
    image: nginx:alpine
    container_name: laravel_backapi_nginx
    restart: unless-stopped
    ports:
      - "18731:80"
    volumes:
      - ./app:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - backapi_net

  mysql:
    image: mysql:8.0
    container_name: laravel_backapi_mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_DATABASE: laravel_backapi
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass_18736
      MYSQL_ROOT_PASSWORD: root_pass_18736
    ports:
      - "18736:3306"
    volumes:
      - mysql_backapi_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot_pass_18736"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backapi_net

networks:
  backapi_net:

volumes:
  mysql_backapi_data:
