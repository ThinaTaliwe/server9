server {
  listen 80;

  resolver 127.0.0.11 valid=10s ipv6=off;

  client_max_body_size 1024m;
  client_body_timeout 600s;
  send_timeout 600s;

  proxy_connect_timeout 60s;
  proxy_send_timeout 600s;
  proxy_read_timeout 600s;

  proxy_request_buffering off;
  proxy_buffering off;
  
  

  location /nkosi/ {
    set $upstream http://nkosi-app:8000;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /dumi/ {
    set $upstream http://dumi-app:8000;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /hlayi/ {
    set $upstream http://hlayi-app:8000;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /bev/ {
    set $upstream http://bev-app:8000;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /phpmyadmin {
      return 301 $scheme://$http_host/phpmyadmin/;
  }

  location ^~ /phpmyadmin/ {
      rewrite ^/phpmyadmin/(.*)$ /$1 break;
      proxy_pass http://phpmyadmin:80;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /siya {
      return 301 $scheme://$http_host/siya/;
  }

  location /siya/ {
    proxy_pass http://siya-app:8000/;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
  }

  default_type text/html;

  location = /login {
    set $upstream http://auth-service:8009;
    proxy_pass $upstream/login;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /_auth {
    internal;
    set $upstream http://auth-service:8009;
    proxy_pass $upstream/auth;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  error_page 401 = @login;
  location @login {
    return 302 /login;
  }

  location = / {
    auth_request /_auth;
    auth_request_set $auth_user $upstream_http_x_auth_user;
    error_page 401 = /login;

    set $upstream http://auth-service:8009;
    proxy_pass $upstream/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cookie $http_cookie;
  }

  location = /logout {
    set $upstream http://auth-service:8009;
    proxy_pass $upstream/logout;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /bfrn {
    return 301 /bfrn/;
  }

  location /bfrn/ {
    set $upstream http://bfrn-nginx:80;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
  }

  location /api/ {
    set $upstream http://auth-service:8009;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /oauth2/ {
    set $upstream http://oauth2-proxy:4180;
    proxy_pass $upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    set $upstream http://auth-service:8009;
    proxy_pass $upstream/static/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /favicon.ico {
    set $upstream http://auth-service:8009;
    proxy_pass $upstream/favicon.ico;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}