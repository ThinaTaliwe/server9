version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: dual_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Africa/Johannesburg
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_net

  app1_init:
    image: composer:2
    container_name: app1_init
    working_dir: /var/www
    user: "${LOCAL_UID}:${LOCAL_GID}"
    volumes:
      - ./projects/app1:/var/www
    command: >
      sh -c "
      if [ ! -f artisan ]; then
        composer create-project laravel/laravel .;
      else
        echo 'app1 already exists, skipping create-project';
      fi
      "
    networks:
      - laravel_net

  app2_init:
    image: composer:2
    container_name: app2_init
    working_dir: /var/www
    user: "${LOCAL_UID}:${LOCAL_GID}"
    volumes:
      - ./projects/app2:/var/www
    command: >
      sh -c "
      if [ ! -f artisan ]; then
        composer create-project laravel/laravel .;
      else
        echo 'app2 already exists, skipping create-project';
      fi
      "
    networks:
      - laravel_net

  app1:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: laravel_app1
    restart: unless-stopped
    depends_on:
      - mysql
      - app1_init
    working_dir: /var/www
    user: root
    environment:
      APP_NAME: LaravelApp1
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8081
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3309
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_PREFIX: app1_
      LOCAL_UID: ${LOCAL_UID}
      LOCAL_GID: ${LOCAL_GID}
      TZ: Africa/Johannesburg
    volumes:
      - ./projects/app1:/var/www
      - ./docker/app/start.sh:/usr/local/bin/start.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/start.sh"]
    networks:
      - laravel_net

  app2:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: laravel_app2
    restart: unless-stopped
    depends_on:
      - mysql
      - app2_init
    working_dir: /var/www
    user: root
    environment:
      APP_NAME: LaravelApp2
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8082
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3309
      DB_DATABASE: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_PREFIX: app2_
      LOCAL_UID: ${LOCAL_UID}
      LOCAL_GID: ${LOCAL_GID}
      TZ: Africa/Johannesburg
    volumes:
      - ./projects/app2:/var/www
      - ./docker/app/start.sh:/usr/local/bin/start.sh
    entrypoint: ["/bin/sh", "/usr/local/bin/start.sh"]
    networks:
      - laravel_net

  nginx_app1:
    image: nginx:alpine
    container_name: nginx_app1
    restart: unless-stopped
    depends_on:
      - app1
    ports:
      - "8181:80"
    volumes:
      - ./projects/app1:/var/www
      - ./docker/nginx/app1.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_net

  nginx_app2:
    image: nginx:alpine
    container_name: nginx_app2
    restart: unless-stopped
    depends_on:
      - app2
    ports:
      - "8182:80"
    volumes:
      - ./projects/app2:/var/www
      - ./docker/nginx/app2.conf:/etc/nginx/conf.d/default.conf
    networks:
      - laravel_net

volumes:
  mysql_data:

networks:
  laravel_net:
    driver: bridge
